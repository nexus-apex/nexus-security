{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Guard | NexusSecurity{% endblock %}
{% block page_title %}{% if editing %}Edit Guard{% else %}New Guard{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Employee Id</label>
        <input type="text" name="employee_id" value="{{ record.employee_id|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rank</label>
        <select name="rank">
          <option value="guard" {% if record.rank == 'guard' %}selected{% endif %}>Guard</option>
          <option value="supervisor" {% if record.rank == 'supervisor' %}selected{% endif %}>Supervisor</option>
          <option value="manager" {% if record.rank == 'manager' %}selected{% endif %}>Manager</option>
        </select>
      </div>
      <div class="form-group">
        <label>Site</label>
        <input type="text" name="site" value="{{ record.site|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="on_leave" {% if record.status == 'on_leave' %}selected{% endif %}>On Leave</option>
          <option value="terminated" {% if record.status == 'terminated' %}selected{% endif %}>Terminated</option>
        </select>
      </div>
      <div class="form-group">
        <label>Joined Date</label>
        <input type="date" name="joined_date" value="{{ record.joined_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Guard</button>
      <a href="/guards/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
