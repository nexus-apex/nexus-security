{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Incident | NexusSecurity{% endblock %}
{% block page_title %}{% if editing %}Edit Incident{% else %}New Incident{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Site</label>
        <input type="text" name="site" value="{{ record.site|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Reported By</label>
        <input type="text" name="reported_by" value="{{ record.reported_by|default:'' }}">
      </div>
      <div class="form-group">
        <label>Severity</label>
        <select name="severity">
          <option value="low" {% if record.severity == 'low' %}selected{% endif %}>Low</option>
          <option value="medium" {% if record.severity == 'medium' %}selected{% endif %}>Medium</option>
          <option value="high" {% if record.severity == 'high' %}selected{% endif %}>High</option>
          <option value="critical" {% if record.severity == 'critical' %}selected{% endif %}>Critical</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Incident Type</label>
        <select name="incident_type">
          <option value="theft" {% if record.incident_type == 'theft' %}selected{% endif %}>Theft</option>
          <option value="trespass" {% if record.incident_type == 'trespass' %}selected{% endif %}>Trespass</option>
          <option value="fire" {% if record.incident_type == 'fire' %}selected{% endif %}>Fire</option>
          <option value="vandalism" {% if record.incident_type == 'vandalism' %}selected{% endif %}>Vandalism</option>
          <option value="medical" {% if record.incident_type == 'medical' %}selected{% endif %}>Medical</option>
          <option value="other" {% if record.incident_type == 'other' %}selected{% endif %}>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="open" {% if record.status == 'open' %}selected{% endif %}>Open</option>
          <option value="investigating" {% if record.status == 'investigating' %}selected{% endif %}>Investigating</option>
          <option value="resolved" {% if record.status == 'resolved' %}selected{% endif %}>Resolved</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Incident</button>
      <a href="/incidents/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
